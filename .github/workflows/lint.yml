name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: service/backend/go.sum

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        run: cd service/backend && templ generate

      - name: go vet
        run: cd service/backend && go vet ./...

      - name: go build
        run: cd service/backend && go build ./cmd/subway-server/

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint with ruff
        run: uvx ruff check tools/ --exclude '**/.venv'

      - name: Typecheck with ty
        run: uvx ty check tools/ --config-file tools/ty.toml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd service/frontend && npm ci

      - name: Biome check
        run: cd service/frontend && npx biome check

      - name: Typecheck
        run: cd service/frontend && npx tsc --noEmit

  firmware:
    name: C/C++ (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build production firmware
        run: cd firmware && pio run

      - name: Build debug firmware
        run: cd tools/debug-firmware && pio run
