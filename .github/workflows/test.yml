name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate
        run: make backend/generate

      - name: Test
        run: make test/go

  frontend:
    name: Frontend (Lua Conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: make test/frontend

  firmware:
    name: Firmware (Lua Conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: make test/firmware
