name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: trunk-io/trunk-action@v1

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate
        run: make backend/generate

      - name: Test
        run: make test/go

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-go
          path: .test-results/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: service/package-lock.json

      - name: Install
        run: make frontend/install

      - name: Typecheck
        run: cd service && npx tsc --noEmit

      - name: Test
        run: cd service && npx vitest run

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-frontend
          path: .test-results/

  firmware:
    name: Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build
        run: make lint/firmware

      - name: Test
        run: make test/firmware

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-firmware
          path: .test-results/

  report:
    name: Test Report
    needs: [go, frontend, firmware]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: .test-results
          merge-multiple: true

      - uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: ".test-results/*.xml"
          reporter: java-junit
