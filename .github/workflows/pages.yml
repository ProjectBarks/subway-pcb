name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'service/backend/internal/ui/landing.templ'
      - 'service/backend/cmd/generate-site/**'
      - 'service/frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/backend/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: service/frontend/package-lock.json

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ
        working-directory: service/backend
        run: templ generate ./internal/ui/

      - name: Render static HTML
        working-directory: service/backend
        run: go run ./cmd/generate-site/ ../../_site

      - name: Build frontend
        working-directory: service/frontend
        run: npm ci && npm run build

      - name: Copy built assets
        run: |
          mkdir -p _site/static/dist
          cp -r service/static/dist/* _site/static/dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
