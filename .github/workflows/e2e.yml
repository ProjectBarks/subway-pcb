name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: service/package-lock.json

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate Go code
        run: cd service && templ generate && go generate ./ui/...

      - name: Install dependencies
        run: make e2e/install

      - name: Build frontend
        run: make frontend/build

      - name: Run E2E tests
        run: make e2e/test

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: service/e2e/screenshots/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: service/e2e/reports/
          retention-days: 14
