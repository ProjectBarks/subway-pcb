syntax = "proto3";
package subway;

option go_package = "github.com/ProjectBarks/subway-pcb/service/gen/subwaypb";

// TrainStatus is a fixed set of states from GTFS-RT.
enum TrainStatus {
    STATUS_NONE   = 0;
    STOPPED_AT    = 1;
    INCOMING_AT   = 2;
    IN_TRANSIT_TO = 3;
}

message Train {
    string      route  = 1;   // unstructured route ID (e.g. "1", "A", "FS", "SI")
    TrainStatus status = 2;
}

message Station {
    string         stop_id = 1;
    repeated Train trains  = 2;
}

// Polled every cycle (~1/sec). Contains ONLY data that changes frequently.
// GET /api/v1/state
message DeviceState {
    string script_hash  = 1;
    string board_hash   = 2;
    uint64 timestamp    = 3;
    repeated Station stations  = 4;
    map<string, string> config = 5;
}

// Fetched on boot and when board_hash changes.
// GET /api/v1/board
message DeviceBoard {
    string                  hash        = 1;
    string                  board_id    = 2;
    uint32                  led_count   = 3;
    repeated uint32         strip_sizes = 4;
    map<uint32, string>     led_map     = 5;
}

// Sent by device as POST body on /api/v1/device-state.
message DeviceDiagnostics {
    message System {
        int32  reset_reason  = 1;
        uint32 free_heap     = 2;
        uint32 largest_block = 3;
    }

    message Fetch {
        bool state_ok          = 1;
        bool board_fetched     = 2;
        bool script_fetched    = 3;
        bool script_hash_match = 4;
    }

    message Lua {
        int32  errors      = 1;
        uint32 mem         = 2;
        int32  last_reload = 3;
    }

    message Render {
        uint32 nonzero_pixels = 1;
        uint32 first_lit_led  = 2;
    }

    System system = 1;
    Fetch  fetch  = 2;
    Lua    lua    = 3;
    Render render = 4;
    string error  = 5;
    string logs   = 6;
}

// Fetched on boot and when script_hash changes.
// GET /api/v1/script
message DeviceScript {
    string                      hash              = 1;
    string                      lua_source        = 2;
    string                      plugin_name       = 3;
    string                      plugin_description = 4;
    map<string, string>         config            = 5;
}
