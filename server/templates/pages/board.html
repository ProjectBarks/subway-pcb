{{define "content"}}
<div class="space-y-6">

    <div class="flex items-center gap-3 mb-2">
        <a href="/" class="text-gray-500 hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl text-gray-200 font-bold">
            {{if .Device.Name}}{{.Device.Name}}{{else}}{{.Device.MAC}}{{end}}
        </h1>
        <span class="relative flex h-2.5 w-2.5">
            {{if isOnline .Device.LastSeen}}
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500 shadow-lg shadow-green-500/50"></span>
            {{else}}
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-gray-600"></span>
            {{end}}
        </span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

        <!-- Left column: Live Board Preview -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-dark-card border border-dark-border rounded-lg p-6">
                <h3 class="text-xs uppercase tracking-wider text-gray-500 mb-4">Live Preview</h3>

                <div id="canvas-wrap" class="relative w-full" style="aspect-ratio: 4/3;">
                    <canvas id="c" class="w-full h-full rounded border border-dark-border bg-dark" style="display:block;width:100%;height:100%;"></canvas>
                </div>
                <div id="tooltip"
                     class="hidden fixed glass border border-dark-border rounded px-2 py-1 text-xs text-gray-300 pointer-events-none z-10"
                     style="display:none;">
                </div>

                <!-- Status bar -->
                <div class="flex items-center gap-4 mt-4 text-xs text-gray-500">
                    <div class="flex items-center gap-1.5">
                        <span id="dot" class="relative flex h-2 w-2">
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-gray-600"></span>
                        </span>
                        <span id="status-text">Connecting...</span>
                    </div>
                    <div>
                        Trains: <span id="train-count">--</span>
                    </div>
                    <div>
                        Seq: <span id="frame-seq">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right column: Controls -->
        <div class="lg:col-span-2">
            {{template "board_controls" .}}
        </div>

    </div>

</div>

<script src="/static/preview.js"></script>
<script>
(function() {
    const TOTAL_LEDS = 478;
    const mac = '{{.Device.MAC}}';

    // Create board using existing board.js (expects element IDs)
    const board = new Board('c', 'tooltip');
    board.brightnessBoost = 1.0;
    board.boardSvgOpacity = 0.07;

    // Protobuf decoder (from app.js)
    function decodePixelFrame(buf) {
        const bytes = new Uint8Array(buf);
        let pos = 0;
        let result = { timestamp: 0, sequence: 0, ledCount: 0, pixels: null };
        function readVarint() {
            let val = 0, shift = 0;
            while (pos < bytes.length) {
                const b = bytes[pos++];
                val |= (b & 0x7f) << shift; shift += 7;
                if ((b & 0x80) === 0) break;
            }
            return val >>> 0;
        }
        while (pos < bytes.length) {
            const tag = readVarint();
            const fieldNum = tag >>> 3, wireType = tag & 0x7;
            if (wireType === 0) {
                const val = readVarint();
                if (fieldNum === 1) result.timestamp = val;
                else if (fieldNum === 2) result.sequence = val;
                else if (fieldNum === 3) result.ledCount = val;
            } else if (wireType === 2) {
                const len = readVarint();
                if (fieldNum === 4) result.pixels = bytes.slice(pos, pos + len);
                pos += len;
            } else if (wireType === 5) { pos += 4; }
            else if (wireType === 1) { pos += 8; }
        }
        return result;
    }

    let lastFetchOk = false;

    async function fetchPixels() {
        try {
            const resp = await fetch('/api/v1/pixels?device=' + encodeURIComponent(mac));
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const buf = await resp.arrayBuffer();
            if (buf.byteLength === 0) {
                board.clearPixels();
                lastFetchOk = true;
                updateStatus(0, 0);
                return;
            }
            const frame = decodePixelFrame(buf);
            if (frame.pixels && frame.pixels.length >= TOTAL_LEDS * 3) {
                board.setPixels(frame.pixels);
            }
            let activeCount = 0;
            for (let i = 0; i < TOTAL_LEDS; i++) {
                if (board.pixelColors[i*3] || board.pixelColors[i*3+1] || board.pixelColors[i*3+2]) activeCount++;
            }
            lastFetchOk = true;
            updateStatus(activeCount, frame.sequence);
        } catch (e) {
            lastFetchOk = false;
            updateStatus(0, 0);
        }
    }

    function updateStatus(trains, seq) {
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const trainCount = document.getElementById('train-count');
        const frameSeq = document.getElementById('frame-seq');
        if (lastFetchOk) {
            if (dot) dot.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>';
            if (statusText) statusText.textContent = 'Connected';
        } else {
            if (dot) dot.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>';
            if (statusText) statusText.textContent = 'Disconnected';
        }
        if (trainCount) trainCount.textContent = trains;
        if (frameSeq) frameSeq.textContent = seq;
    }

    async function init() {
        await board.init('/static/leds.json', '/static/board.svg');
        board.startDrawLoop();

        // Initialize preview renderer for theme editing
        window._previewRenderer = new PreviewRenderer(board);
        await window._previewRenderer.init();

        await fetchPixels();
        setInterval(fetchPixels, 1000);
    }

    init();
})();
</script>
{{end}}
