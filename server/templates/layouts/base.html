{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} | {{end}}NYC Subway PCB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a830',
                        dark: {
                            DEFAULT: '#0a0a0a',
                            card: '#111111',
                            border: '#1e1e1e',
                            hover: '#1a1a1a',
                        },
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        }
    </script>

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/board.js"></script>

    <style>
        body {
            scrollbar-width: thin;
            scrollbar-color: #1e1e1e #0a0a0a;
        }
        body::-webkit-scrollbar {
            width: 6px;
        }
        body::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        body::-webkit-scrollbar-thumb {
            background: #1e1e1e;
            border-radius: 3px;
        }
        .glass {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes toast-fade {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(10px); }
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-dark text-gray-400 font-mono min-h-screen flex">

    {{template "nav" .}}

    <main class="lg:ml-64 flex-1 min-h-screen">
        <div class="p-4 pt-14 lg:p-8 lg:pt-8">
            {{block "content" .}}{{end}}
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3">
    </div>

    <script>
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            const toast = evt.detail.target.querySelector('[data-toast]');
            if (toast) {
                const container = document.getElementById('toast-container');
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3500);
            }
        });

        document.body.addEventListener('showToast', function(evt) {
            const container = document.getElementById('toast-container');
            const msg = evt.detail.message || '';
            const type = evt.detail.type || 'success';
            const div = document.createElement('div');
            div.className = 'glass border rounded-lg px-4 py-3 text-sm shadow-lg ' +
                (type === 'error' ? 'border-red-500/50 text-red-400' : 'border-green-500/50 text-green-400');
            div.style.animation = 'toast-fade 3.5s ease forwards';
            div.textContent = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3500);
        });
    </script>
</body>
</html>
{{end}}
