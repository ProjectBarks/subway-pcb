root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/subway-server"
  cmd = "templ generate && go build -o ./tmp/subway-server ./cmd/subway-server/"
  full_bin = "./tmp/subway-server --port 8080 --boards-dir public/boards --data-dir data --static-dir static --dev"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules"]
  exclude_regex = [".*_templ\\.go", ".*_gen\\.go"]
  include_ext = ["go", "templ"]
  include_dir = ["cmd", "internal", "ui"]
  exclude_file = []
  exclude_unchanged = false
  follow_symlink = false
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
